server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: redirige todas las rutas al index para que React Router funcione
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para assets con hash (Vite los genera con nombre único)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
